<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT Agent Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Terminal specific scrollbar */
        aside ::-webkit-scrollbar-thumb {
            background: #4b5563;
        }

        aside ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        /* History sidebar scrollbar */
        #history-sidebar ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
        }

        #history-sidebar ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        /* Make markdown body background transparent to inherit parent */
        .markdown-body {
            background-color: transparent !important;
            font-family: inherit;
        }

        .flow-card-wrapper {
            animation: fadeInUp 0.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-gray-50 h-screen flex flex-col font-sans text-gray-800">
    <!-- Header -->
    <header class="bg-blue-600 text-white shadow-lg p-4 flex justify-between items-center z-10 relative">
        <h1 class="text-xl font-bold flex items-center gap-2 tracking-wide">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                </path>
            </svg>
            PPT Agent Service
        </h1>
        <div class="flex items-center gap-4">
            <div class="text-sm font-medium bg-blue-700 px-3 py-1.5 rounded-full flex items-center gap-2 shadow-inner">
                <span class="relative flex h-3 w-3">
                    <span id="status-ping"
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75 hidden"></span>
                    <span id="status-dot" class="relative inline-flex rounded-full h-3 w-3 bg-gray-400"></span>
                </span>
                <span id="agent-state">INIT</span>
            </div>
            <button id="reset-btn"
                class="text-sm font-medium bg-white text-blue-600 px-4 py-1.5 rounded shadow hover:bg-blue-50 hover:shadow-md transition-all active:scale-95 focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-blue-600">新会话</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        <!-- History Sidebar (Left) -->
        <aside id="history-sidebar"
            class="w-64 bg-gray-50 border-r border-gray-200 flex flex-col hidden sm:flex shadow-inner">
            <div class="p-3 border-b border-gray-200 flex justify-between items-center bg-white shadow-sm z-10">
                <h2 class="text-sm font-semibold text-gray-700 flex items-center gap-2">
                    <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    历史会话
                </h2>
                <button id="new-chat-btn"
                    class="text-blue-600 hover:bg-blue-50 p-1.5 rounded transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500"
                    title="新建会话">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-2">
                <ul id="session-list" class="space-y-1">
                    <!-- Session items will be dynamically injected here -->
                </ul>
            </div>
        </aside>

        <!-- Chat Area (Center) -->
        <section class="flex-1 flex flex-col border-r border-gray-200 bg-white relative">
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 relative scroll-smooth">
                <!-- Welcome Message -->
                <div class="flex gap-4 max-w-3xl mx-auto w-full">
                    <div
                        class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center shrink-0 shadow-sm mt-1">
                        <span class="text-blue-600 font-bold text-sm">AI</span>
                    </div>
                    <div
                        class="bg-gray-50 rounded-2xl rounded-tl-none px-5 py-3 text-gray-800 shadow-sm border border-gray-100 markdown-body w-full">
                        <p>你好！我是 PPT Agent。请告诉我你想生成什么主题的演示文稿，或者直接粘贴内容大纲给我。</p>
                    </div>
                </div>
            </div>

            <!-- Scroll to Bottom Button -->
            <button id="scroll-to-bottom-btn"
                class="absolute bottom-[100px] right-8 bg-white text-gray-600 rounded-full p-2.5 shadow-md border border-gray-200 hover:bg-gray-50 hover:text-blue-600 transition-all hidden z-20 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1"
                title="滚动到底部">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                </svg>
            </button>

            <!-- Input Area -->
            <div class="p-4 bg-white border-t border-gray-200 shadow-[0_-4px_10px_-2px_rgba(0,0,0,0.05)] relative z-10">
                <form id="chat-form" class="max-w-3xl mx-auto relative flex items-end gap-2">
                    <div
                        class="relative flex-1 bg-gray-50 border border-gray-300 rounded-xl shadow-inner focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent focus-within:bg-white focus-within:shadow-md hover:bg-white hover:shadow-sm transition-all group-disabled:bg-gray-100">
                        <textarea id="user-input" rows="1"
                            class="w-full bg-transparent border-none outline-none focus:outline-none focus:ring-0 resize-none py-3 px-4 max-h-40 min-h-[48px] text-gray-800 placeholder-gray-400 disabled:cursor-not-allowed"
                            placeholder="输入 PPT 主题或内容... (Shift + Enter 换行)" required></textarea>
                    </div>
                    <button type="submit" id="send-btn"
                        class="bg-blue-600 hover:bg-blue-700 hover:shadow-lg text-white p-3 rounded-xl shadow-md transition-all flex items-center justify-center h-[48px] w-[48px] shrink-0 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-blue-600 disabled:hover:shadow-md active:scale-95 group">
                        <svg id="send-icon" class="w-5 h-5 transform rotate-90" fill="currentColor" viewBox="0 0 20 20"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z">
                            </path>
                        </svg>
                        <svg id="stop-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"
                            xmlns="http://www.w3.org/2000/svg">
                            <rect x="5" y="5" width="10" height="10" rx="1"></rect>
                        </svg>
                    </button>
                </form>
                <div class="max-w-3xl mx-auto mt-2 text-xs text-center text-gray-400">
                    按 Enter 发送，Shift + Enter 换行
                </div>
            </div>
        </section>

        <!-- Debug / Trace Panel (Right) -->
        <aside class="w-96 bg-gray-900 flex flex-col hidden md:flex text-gray-300 font-mono shadow-inner">
            <div class="p-3 border-b border-gray-700 bg-gray-800 flex justify-between items-center shadow-sm z-10">
                <h2 class="text-sm font-semibold text-gray-200 flex items-center gap-2">
                    <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                    </svg>
                    终端 & 追踪
                </h2>
                <button id="clear-trace-btn"
                    class="text-xs text-gray-400 hover:text-white transition-colors focus:outline-none focus:ring-1 focus:ring-gray-400 rounded px-1"
                    title="清空日志">
                    清空
                </button>
            </div>

            <div class="p-3 border-b border-gray-800 text-xs bg-gray-900/50">
                <div class="flex justify-between mb-1">
                    <span class="text-gray-500">Token 消耗:</span>
                    <span id="token-usage" class="font-medium text-green-400">0</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-500">Session ID:</span>
                    <span id="session-id-display" class="text-gray-400 truncate max-w-[180px]"></span>
                </div>
            </div>

            <div id="trace-container" class="flex-1 overflow-y-auto p-3 space-y-2 text-xs">
                <!-- Trace items will be appended here -->
                <div class="text-gray-600 italic text-center py-4">暂无执行追踪...</div>
            </div>
        </aside>
    </main>

    <script src="/app.js"></script>
</body>

</html>
